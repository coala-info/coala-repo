198da","type":"MetGeneSearch","data":null,"inputs":{"gene":{"id":"8d325af7-e4a3-00fb-16f8-b26a1c97546d"}}}},{"id":"041fbd01-1d36-adbc-7e63-ee1d411ffe8e","cell_metadata":{"id":"3efa2ee6-ef0a-d2c6-3a8c-cef13a9ebacb","label":"","description":"","process_visible":false,"data_visible":true},"playbook_metadata":null,"process":{"id":"2e549c22-53f1-139e-2c1a-8beb62b08607","type":"MetgeneMetabolites","data":null,"inputs":{"summary":{"id":"b903ac9e-b77d-d527-5b9c-26e2f58198da"}}}},{"id":"31a77bba-7221-bce8-03e6-0c921ea54ad0","cell_metadata":{"id":"9a96d771-2dc5-5393-3a77-de236ebcb6bd","label":"","description":"","process_visible":false,"data_visible":false},"playbook_metadata":null,"process":{"id":"29b8026f-59ce-7fae-229f-80a0043347a0","type":"MetGeneRxns","data":null,"inputs":{"summary":{"id":"b903ac9e-b77d-d527-5b9c-26e2f58198da"}}}},{"id":"36be2a03-8779-8bbe-03de-523aef57ecd2","cell_metadata":{"id":"3efa2ee6-ef0a-d2c6-3a8c-cef13a9ebacb","label":"","description":"","process_visible":false,"data_visible":true},"playbook_metadata":{"id":"39efa234-519d-c5d3-22d2-60980dedfafd","title":"Use Case 13: Prioritizing Targets for Individual Cancer patients","description":"Given RNA-seq samples from a patient tumor, we screen for targets which are highly expressed in the tumor but lowly expressed across all healthy human tissues in GTEx. Detailed information about the the selected target are queried from several DCCs.","summary":"auto","gpt_summary":""},"process":{"id":"18869148-c21a-990d-387b-4cbc3c4f95ba","type":"GetRegulatoryElementsForGeneInfoFromGene","data":null,"inputs":{"gene":{"id":"8d325af7-e4a3-00fb-16f8-b26a1c97546d"}}}},{"id":"63d937db-8082-78f3-4961-57f814a0d0ef","cell_metadata":{"id":"3efa2ee6-ef0a-d2c6-3a8c-cef13a9ebacb","label":"","description":"","process_visible":false,"data_visible":true},"playbook_metadata":{"id":"537e88bb-0fba-fa6c-5586-40c64a6c6545","title":"Use Case 13: Novel Cell Surface Targets for Individual Cancer Patients Analyzed with Common Fund Datasets","description":"The input to this workflow is a data matrix of gene expression that was collected from a pediatric patient tumor patient from the KidsFirst Common Fund program [1]. The RNA-seq samples are the columns of the matrix, and the rows are the raw expression gene count for all human coding genes (Table 1). This data matrix is fed into TargetRanger [2] to screen for targets which are highly expressed in the tumor but lowly expressed across most healthy human tissues based on gene expression data collected from postmortem patients with RNA-seq by the GTEx Common Fund program [3]. Based on this analysis the gene IMP U3 small nucleolar ribonucleoprotein 3 (IMP3) was selected because it was the top candidate returned from the TargetRanger analysis (Tables 2-3). IMP3 is also commonly called insulin-like growth factor 2 mRNA-binding protein 3 (IGF2BP3). Next, we leverage unique knowledge from various other Common Fund programs to examine various functions and knowledge related to IMP3. First, we queried the LINCS L1000 data [4] from the LINCS program [5] converted into RNA-seq-like LINCS L1000 Signatures [6] using the SigCom LINCS API [7] to identify mimicker or reverser small molecules that maximally impact the expression of IMP3 in human cell lines (Fig. 1, Table 4). In addition, we also queried the LINCS L1000 data to identify single gene CRISPR knockouts that down-regulate the expression of IMP3 (Fig. 1, Table 5). These potential drug targets were filtered using the Common Fund IDG program's list of understudied proteins [8] to produce a set of additional targets (Table 6). Next, IMP3 was searched for knowledge provided by the with the Metabolomics Workbench MetGENE tool [9]. MetGENE aggregates knowledge about pathways, reactions, metabolites, and studies from the Metabolomics Workbench Common Fund supported resource [10]. The Metabolomics Workbench was searched to find associated metabolites linked to IMP3 [10]. Furthermore, we leveraged  the Linked Data Hub API [11] to list knowledge about regulatory elements associated with IMP3 (Table 6). Finally, the GlyGen database [12] was queried to identify relevant sets of proteins that are the product of the IMP3 genes, as well as known post-translational modifications discovered on IMP3.\n\nReferences\n1. Heath, Allison P., et al. \"Gabriella Miller Kids First Data Resource Center: Harmonizing clinical and genomic data to support childhood cancer and structural birth defect research.\" Cancer Research 79.13_Supplement (2019): 2464-2464.\n2. G. B. Marino, et al. GeneRanger and TargetRanger: processed gene and protein expression levels across cells and tissues for target discovery, Nucleic Acids Research. 51, W1, 5 July 2023, Pages W213–W224, https://doi.org/10.1093/nar/gkad399\n3. Lonsdale, J. et al. The Genotype-Tissue Expression (GTEx) project. Nature Genetics vol. 45 580–585 (2013). doi:10.1038/ng.2653\n4. Subramanian A, et al. A Next Generation Connectivity Map: L1000 Platform and the First 1,000,000 Profiles. Cell. 2017 Nov 30;171(6):1437-1452.e17. doi: 10.1016/j.cell.2017.10.049. \n5. Keenan AB, et al. The Library of Integrated Network-Based Cellular Signatures NIH Program: System-Level Cataloging of Human Cells Response to Perturbations. Cell Syst. 2018 Jan 24;6(1):13-24. doi: 10.1016/j.cels.2017.11.001\n6. Jeon M, et al. Transforming L1000 profiles to RNA-seq-like profiles with deep learning. BMC Bioinformatics. 2022 Sep 13;23(1):374. doi: 10.1186/s12859-022-04895-5.\n7. Evangelista, J. E. et al. SigCom LINCS: data and metadata search engine for a million gene expression signatures. Nucleic Acids Research vol. 50 W697–W709 (2022). doi:10.1093/nar/gkac328\n8. Oprea TI, et al. Unexplored therapeutic opportunities in the human genome. Nat Rev Drug Discov. 2018 May;17(5):317-332. doi: 10.1038/nrd.2018.14\n9. Srinivasan S, et al. MetGENE: gene-centric metabolomics information retrieval tool. Gigascience. 2022 Dec 28;12:giad089. doi: 10.1093/gigascience/giad089\n10. Sud M, et al. Metabolomics Workbench: An international repository for metabolomics data and metadata, metabolite standards, protocols, tutorials and training, and analysis tools. Nucleic Acids Res. 2016 Jan 4;44(D1):D463-70. doi: 10.1093/nar/gkv1042.\n11. Linked Data Hub, https://ldh.genome.network/cfde/ldh/\n12. York, W. S. et al. GlyGen: Computational and Informatics Resources for Glycoscience. Glycobiology vol. 30 72–73 (2019). doi:10.1093/glycob/cwz080\n","summary":"manual","gpt_summary":""},"process":{"id":"b8a54b2e-77ec-0077-3af2-2045177eef80","type":"GlyGenProteinInformation","data":null,"inputs":{"gene":{"id":"8d325af7-e4a3-00fb-16f8-b26a1c97546d"}}}}],"/api/db/process/9de92376-d662-bdba-cf84-0c0c58b4e374/output":{"id":"de9aa0a7-f3dd-9385-5bc5-7ef846c2f7df","type":"FileURL","value":{"url":"drs://playbook-workflow-builder.cloud/437bd1e3-44e1-4668-92b5-3cf06552c65e","filename":"example.h5ad","sha256":"f88cd39c3e6e730893624122a5919f42a019265d44ebd56fff1caa4b24705497","size":2346272}},"/api/db/process/048f537b-ada0-51f3-2ee2-0292cfa4e701/output":{"id":"e754f4fc-c599-b3a7-0bb9-a9bd790b3280","type":"GeneCountMatrix","value":{"url":"drs://playbook-workflow-builder.cloud/437bd1e3-44e1-4668-92b5-3cf06552c65e","filename":"example.h5ad","size":2346272,"shape":[35238,6],"index":["A1BG","A1CF","A2M","A2ML1","A2MP1","BP-2171C21.4","BP-2171C21.5","BP-2171C21.6","BP-2189O9.2","YR211F11.2"],"columns":["melanocyte_1","melanocyte_2","melanocyte_3","melanoma_1","melanoma_2","melanoma_3"],"values":[[400,320,490,331,363,390],[1,1,3,0,0,1],[23278,47606,20484,2652,2707,2854],[6,8,10,1,7,4],[21,7,34,0,6,3],[0,0,1,3,0,0],[0,0,0,0,2,0],[6,0,6,15,21,14],[2,4,3,66,85,60],[0,0,1,0,0,1]],"ellipses":[5,null]}},"/api/db/process/373e902a-eba7-abaf-c0b0-cf40c9352016/output":{"id":"0b06d382-0c17-d422-98a3-b0d149d77f5c","type":"Scored[Gene]","value":[{"term":"IMP3","zscore":"inf"},{"term":"ARHGDIA","zscore":"inf"},{"term":"GPRIN1","zscore":7.228029458504072},{"term":"CARM1","zscore":6.980134577600063},

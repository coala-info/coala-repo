stages:
  - validation

cwl validation:
  image: python:3.9
  stage: validation
  script:
    - pip install --quiet cwltool
    - |
      FAIL=0
      find . -type f -name "*.cwl" -not -path "*/templates/*" | while read -r cwl_file; do
        echo "Validating: ${cwl_file}"
        if ! cwltool --validate "${cwl_file}"; then
          echo "Validation failed for ${cwl_file}"
          FAIL=1
        else
          echo "Validation succeeded for ${cwl_file}"
        fi
        echo "----------------------------------"
      done
      # If any file failed validation, exit non-zero to fail the job
      if [ $FAIL -ne 0 ]; then
        echo "Some CWL files failed validation. Job failing."
        exit 1
      else
        echo "All .cwl files validated successfully!"
      fi

ro crate validation:
  image: python:3.9
  stage: validation
  script:
    - pip install --quiet roc-validator
    - |
      FAIL=0
      ALL_ERRORS=""

      # Find all directories that have a direct child named "ro-crate-metadata.json", excluding templates directories
      for crate_dir in $(find . -type f -name "ro-crate-metadata.json" -not -path "*/templates/*" -exec dirname {} \; | sort -u); do
        echo "Found ro-crate-metadata.json in: $crate_dir"
        echo "Validating RO-Crate in directory: $crate_dir"
        echo "----------------------------------"

        # For each profile, capture the entire validator output in a variable
        for profile in ro-crate-1.1 process-run-crate-0.5 workflow-ro-crate-1.0 workflow-run-crate-0.5; do
          echo "Validating with profile: $profile"

          # Capture output (both stdout & stderr) into 'output' variable
          output="$(rocrate-validator -y validate "$crate_dir" --no-fail-fast -p "$profile" -v 2>&1)"
          exit_code=$?

          if [ $exit_code -ne 0 ]; then
            echo "Validation FAILED for $crate_dir with profile $profile"
            FAIL=1

            # Extract lines that contain the errors
            error_lines="$(echo "$output" | awk '/\[FAILED\] RO-Crate is not a valid/ {found=1} found')"
            ALL_ERRORS="$ALL_ERRORS
      -----------------------------------------------
      RO-Crate directory: $crate_dir
      Profile: $profile
      $error_lines
      -----------------------------------------------
      "
          else
            echo "Validation SUCCEEDED for $crate_dir with profile $profile"
          fi
          echo "----------------------------------"
        done
      done
      # At the very end, if anything failed, print the error summary and exit
      if [ $FAIL -ne 0 ]; then
        echo "Some RO-Crates failed validation. Summary of errors:"
        echo "$ALL_ERRORS"
        exit 1
      else
        echo "All RO-Crates validated successfully!"
      fi

    <script>
document.addEventListener("DOMContentLoaded", function() {
    var cy = cytoscape({
        container: document.getElementById('cy'),
        elements: [{"group": "nodes", "data": {"id": "Workflow fully interactive", "label": "Workflow fully interactive", "doc": "Choose whether you want to have only interactive tools (for more experimented user) or if you want a workflow hat combines interactive and non-interactive tools (easier)", "tool_id": null, "step_type": "boolean", "repo_link": null}, "classes": ["type_boolean", "input"], "position": {"x": 29, "y": 359}}, {"group": "nodes", "data": {"id": "Eutrophication_Med_profiles_2022_unrestricted_SNAPSHOT_2023-10-24T16-39-44.zip", "label": "Eutrophication_Med_profiles_2022_unrestricted_SNAPSHOT_2023-10-24T16-39-44.zip", "doc": "The data here are Mediterranean Sea - Eutrophication and Acidity aggregated datasets EMODnet Chemistry.", "tool_id": null, "step_type": "data", "repo_link": null}, "classes": ["type_data", "input"], "position": {"x": 331, "y": 474}}, {"group": "nodes", "data": {"id": "Workflow semi automatic", "label": "Workflow semi automatic", "doc": "Choose whether you want to have only interactive tools (for more experimented user) or if you want a workflow hat combines interactive and non-interactive tools (easier)", "tool_id": null, "step_type": "boolean", "repo_link": null}, "classes": ["type_boolean", "input"], "position": {"x": 30, "y": 708}}, {"group": "nodes", "data": {"id": "gebco_30sec_8.nc", "label": "gebco_30sec_8.nc", "doc": "A bathymetry file in netcdf.", "tool_id": null, "step_type": "data", "repo_link": null}, "classes": ["type_data", "input"], "position": {"x": 614, "y": 903}}, {"group": "nodes", "data": {"id": "Ocean Data View", "label": "Ocean Data View", "doc": "Interactively subset you data.", "tool_id": "interactive_tool_odv", "step_type": "tool", "repo_link": null}, "classes": ["type_tool", "runnable"], "position": {"x": 604, "y": 486}}, {"group": "edges", "data": {"id": "Ocean Data View__to__Eutrophication_Med_profiles_2022_unrestricted_SNAPSHOT_2023-10-24T16-39-44.zip", "source": "Eutrophication_Med_profiles_2022_unre         layout: {
            name: 'preset'
        },
        // so we can see the ids
        style: [
            {
                selector: 'node',
                style: {
                    'label': 'data(label)'
                }
            },
            {
                selector: 'edge',
                style: {
                    'curve-style': 'bezier',
                    'target-arrow-shape': 'vee',
                    'arrow-scale': 2
                }
            },
            {
                selector: ".input",
                style: {
                    shape: 'diamond',
                    'background-color': '#d0bb46'
                }
            },
            {
                selector: ".runnable",
                style: {
                    shape: 'round-rectangle',
                    'background-color': '#2c3143'
                }
            }
        ]
      });

  function makePopper(ele) {
    let ref = ele.popperRef(); // used only for positioning

    ele.tippy = new tippy(ref, { // tippy options:
      content: function() {
        let content = document.createElement('div');

        let innerHTML = '';
        if(ele.isNode()) {
            let stepType = ele.data("step_type");
            innerHTML +=  "<p><i>Step Type:</i> " + stepType + "</p>";
            let toolId = ele.data("tool_id");
            if (toolId) {
                innerHTML +=  "<p><i>ToolID:</i> " + toolId + "</p>";
            }
            let repoLink = ele.data("repo_link");
            if (repoLink) {
                innerHTML += "<a href=" + repoLink + '">Visit Tool Shed Repository</a>';
            }
            let doc = ele.data('doc');
            if (doc) {
                innerHTML += "<p>" + doc + "</p>";
            }
        } else {
            let output = ele.data("output");
            let input = ele.data("input");
            if(output) {
                innerHTML += "Output named " + output + " connects to " + input;
            } else {
                innerHTML += "Connected to input " + input;
            }
        }
        content.innerHTML = innerHTML;

        return content;
      },
      delay: [0,1000],
      interactive: true,
      placement: 'bottom',
      trigger: 'manual' // probably want manual mode
    });
  }

 cy.ready(function() {
    cy.elements().forEach(function(ele) {
      makePopper(ele);
    });
  });

  cy.elements().unbind('mouseover');
  cy.elements().bind('mouseover', function(event) { event.target.tippy.show(); });

  cy.elements().unbind('mouseout');
  cy.elements().bind('mouseout', function(event) { event.target.tippy.hide(); });
  // document.querySelector('#cypng').setAttribute('src', cy.png());
});

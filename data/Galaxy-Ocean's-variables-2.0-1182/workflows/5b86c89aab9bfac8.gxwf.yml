      top: 486.70594520850074
    tool_state:
      __input_ext: zip
      chromInfo: /opt/galaxy/tool-data/shared/ucsc/chrom/?.len
      method:
        __current_case__: 1
        folder:
          __class__: ConnectedValue
        type: zip
    in:
      method|folder:
        source: Eutrophication_Med_profiles_2022_unrestricted_SNAPSHOT_2023-10-24T16-39-44.zip
  Interactive DIVAnd jupyterlab:
    tool_id: interactive_tool_divand
    tool_version: 0.0.6
    doc: Create a climatology interactively with notebooks
    position:
      left: 956.526945566784
      top: 357.7537761235078
    when: $(inputs.when)
    tool_state:
      input:
        __class__: ConnectedValue
      mode:
        __current_case__: 0
        mode_select: scratch
    in:
      input:
        source: Ocean Data View/outputs_netcdf
      when:
        source: Workflow fully interactive
  DIVAnd (create a climatology):
    tool_id: toolshed.g2.bx.psu.edu/repos/ecology/divand_full_analysis/divand_full_analysis/0.1.0+galaxy0
    tool_version: 0.1.0+galaxy0
    doc: Create a climatology (not interactively)
    position:
      left: 958.2529539113443
      top: 679.118779662132
    when: $(inputs.when)
    tool_state:
      __input_ext: input
      bathname:
        __class__: ConnectedValue
      chromInfo: /opt/galaxy/tool-data/shared/ucsc/chrom/?.len
      enddate: '2017-01-01'
      input_netcdf_identifier:
        __class__: ConnectedValue
      input_netcdf_identifier|__identifier__: data_from_Eutrophication_Med_profiles_2022_unrestricted.nc
      latmax: '38.0'
      latmin: '32.0'
      longmax: '30.0'
      longmin: '19.0'
      selmax: '100'
      selmin: '0'
      startdate: '1950-12-31'
      varname: phosphate
    in:
      input_netcdf_identifier:
        source: Ocean Data View/outputs_netcdf
      bathname:
        source: gebco_30sec_8.nc
      when:
        source: Workflow semi automatic
    out:

steps:
  'Prodigal Gene Predictor ':
    tool_id: toolshed.g2.bx.psu.edu/repos/iuc/prodigal/prodigal/2.6.3+galaxy0
    tool_version: 2.6.3+galaxy0
    doc: Create the protein fasta file
    position:
      left: 250.3965410835214
      top: 441.31949463344165
    tool_state:
      __input_ext: input
      chromInfo: /opt/galaxy/tool-data/shared/ucsc/chrom/?.len
      closed: false
      force_nonsd: false
      input_fa:
        __class__: ConnectedValue
      input_train: null
      masked_seq: false
      out_format: gbk
      procedure: meta
      trans_table: '11'
    in:
      input_fa:
        source: Fasta nucelotide file
  'Sanntis: Build Genbank ':
    tool_id: toolshed.g2.bx.psu.edu/repos/ecology/sanntis_marine/sanntis_marine/0.9.3.5+galaxy1
    tool_version: 0.9.3.5+galaxy1
    doc: Use of Sanntis
    position:
      left: 715.403011844556
      top: 236.8431499791749
    tool_state:
      __input_ext: input
      chromInfo: /opt/galaxy/tool-data/shared/ucsc/chrom/?.len
      selection:
        __current_case__: 1
        input_nuc:
          __class__: ConnectedValue
        input_prot:
          __class__: ConnectedValue
        which_sanntis: genbank
    in:
      selection|input_nuc:
        source: Fasta nucelotide file
      selection|input_prot:
        source: Prodigal Gene Predictor /output_faa
  Regex Find And Replace:
    tool_id: toolshed.g2.bx.psu.edu/repos/galaxyp/regex_find_replace/regex1/1.0.3
    tool_version: 1.0.3
    doc: Remove useless * in the protein fasta file
    position:
      left: 590.0224617880027
      top: 608.4869646334582
    tool_state:
      __input_ext: input
      checks:
      - __index__: 0
        pattern: \*$
        replacement: ''
      chromInfo: /opt/galaxy/tool-data/shared/ucsc/chrom/?.len
      input:
        __class__: ConnectedValue
    in:
      input:
        source: Prodigal Gene Predictor /output_faa
  ' InterProScan':
    tool_id: toolshed.g2.bx.psu.edu/repos/bgruening/interproscan/interproscan/5.59-91.0+galaxy3
    tool_version: 5.59-91.0+galaxy3
    doc: Create TSV file for Sanntis
    position:
      left: 888.2399382143647
      top: 606.9532717459192
    tool_state:
      __input_ext: input
      applications:
      - TIGRFAM
      - FunFam
      - SFLD
      - SUPERFAMILY
      - PANTHER
      - Gene3D
      - Hamap
      - PrositeProfiles
      - Coils
      - SMART
      - CDD
      - PRINTS
      - PIRSR
      - PrositePatterns
      - AntiFam
      - Pfam
      - MobiDBLite
      - PIRSF
      chromInfo: /opt/galaxy/tool-data/shared/ucsc/chrom/?.len
      database: 5.59-91.0
      goterms: true
      input:
        __class__: ConnectedValue
      iprlookup: false
      licensed:
        __current_case__: 0
        use: 'false'
      oformat: TSV
      pathways: true
      seqtype: p
    in:
      input:
        source: Regex Find And Replace/out_file1
  'Sanntis: identify biosynthetic gene clusters':
    tool_id: toolshed.g2.bx.psu.edu/repos/ecology/sanntis_marine/sanntis_marine/0.9.3.5+galaxy1
    tool_version: 0.9.3.5+galaxy1
    position:
      left: 1151.9503777422938
      top: 319.39463092564574
    tool_state:
      __input_ext: input
      chromInfo: /opt/galaxy/tool-data/shared/ucsc/chrom/?.len
      selection:
        __current_case__: 0
